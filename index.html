<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nox</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <div class="container" id="container">

        <!-- LOGIN -->

        <section class="page login-page">

            <div class="hero login-hero">

                <img
                src="image/anime.jpg">

                <div class="overlay">

                    <h1>Welcome Back</h1>

                    <p>
                        The forest remembers every traveler.
                    </p>

                </div>

            </div>

            <div class="form-area">
<h2 class="form-title">
Login
</h2>
                <div class="input-box">

                    <div class="icon">
                        <i class="fa-regular fa-user"></i>
                    </div>

                    <input
                    type="text"
                    placeholder="Username">

                </div>

                <div class="input-box reverse">

<input
type="password"
placeholder="Password">

<div class="icon">
<i class="fa-solid fa-lock"></i>
</div>

                </div>

                <button class="main-btn">
                    Login
                </button>

                <p class="switch">

                    New here?

                    <span id="showSignup">
                        Sign Up
                    </span>

                </p>

            </div>

        </section>

        <!-- SIGNUP -->

        <section class="page signup-page">
<h2 class="form-title">
Sign Up
</h2>
            <div class="form-area signup-form">

                <div class="input-box">

                    <div class="icon">
                        <i class="fa-regular fa-user"></i>
                    </div>

                    <input
                    type="text"
                    placeholder="Username">

                </div>

                <div class="input-box reverse">
<input
                    type="email"
                    placeholder="Email">
                <div class="icon">
                        <i class="fa-regular fa-envelope"></i>
                </div>

                </div>

                <div class="input-box">

                    <div class="icon">
                        <i class="fa-solid fa-lock"></i>
                    </div>

                    <input
                    type="password"
                    placeholder="Password">

                </div>

                <button class="main-btn">
                    Create Account
                </button>

                <p class="switch">

                    Already here?

                    <span id="showLogin">
                        Login
                    </span>

                </p>

            </div>

            <div class="hero signup-hero">

                <img
                src="image/anime.jpg">

                <div class="overlay">

                    <h1>Begin Your Journey</h1>

                    <p>
                        Every path starts with a single step.
                    </p>

                </div>

            </div>

        </section>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

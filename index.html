<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="particles"></div>

<div class="door-container" id="doorContainer">

    <div class="door left-door"></div>
    <div class="door right-door"></div>

    <div class="card-wrapper">

        <div class="flip-card" id="flipCard">

            <!-- LOGIN -->

            <div class="card-side front">

                <div class="hero">

                    <img src="image/retro sky.jpg" alt="AI">

                    <h1>Welcome!</h1>

                    <p>Learn Smarter With AI</p>

                </div>

                <div class="form">

                    <input type="text" placeholder="Username">

                    <input type="password" placeholder="Password">

                    <button id="loginBtn">Login</button>

                    <span class="switch">
                        New here?
                        <a id="showSignup">Sign Up</a>
                    </span>

                </div>

            </div>

            <!-- SIGNUP -->

            <div class="card-side back">

                <div class="hero">

                    <img src="images/retro sky.jpg" alt="AI">

                    <h1>Start Your Journey</h1>

                    <p>Every path starts with small steps</p>

                </div>

                <div class="form">

                    <input type="text" placeholder="Username">

                    <input type="email" placeholder="Email">

                    <input type="password" placeholder="Password">

                    <button>Sign Up</button>

                    <span class="switch">
                        Already have account?
                        <a id="showLogin">Login</a>
                    </span>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- HOME PAGE -->

<div class="home-page" id="homePage">

    <h1>📚 AI Lecture Notes</h1>

    <p>Welcome Back!</p>

    <button class="settings-btn">⚙ Settings</button>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Notes</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="stars"></div>

<div class="container">

<div class="book-card">

<div class="mascot-wrapper">

<div class="magic-ring"></div>

<img
src="images/ai-mascot.png"
alt="AI Mascot"
class="mascot">

</div>

<h1>Arcane Notes</h1>

<p class="subtitle">
Where Ancient Wisdom Meets Artificial Intelligence
</p>

<div class="form-side login-side active">

<div class="input-box left-icon">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Scholar Name">
</div>

<div class="input-box right-icon">
<input type="password" placeholder="Secret Key">
<i class="fa-solid fa-lock"></i>
</div>

<button class="magic-btn" id="loginBtn">
Open The Archive
</button>

<div class="switch-text">
New scholar?
<span id="showSignup">Create Account</span>
</div>

</div>

<div class="form-side signup-side">

<div class="input-box left-icon">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Scholar Name">
</div>

<div class="input-box right-icon">
<input type="email" placeholder="Ancient Mail">
<i class="fa-solid fa-envelope"></i>
</div>

<div class="input-box left-icon">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Secret Key">
</div>

<div class="input-box right-icon">
<input type="password" placeholder="Confirm Key">
<i class="fa-solid fa-key"></i>
</div>

<button class="magic-btn">
Join The Academy
</button>

<div class="switch-text">
Already registered?
<span id="showLogin">Login</span>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

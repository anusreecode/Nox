<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nox</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="phone">

    <div class="forms-container">


        <section class="screen login-screen">

            <div class="top-image">
                <img src="https://www.google.com/imgres?imgurl=https%3A%2F%2Fi.pinimg.com%2Fcustom_covers%2F200x150%2F928093504399922265_1769216434.jpg&tbnid=9h-FzJePUL214M&vet=1&imgrefurl=https%3A%2F%2Fwww.pinterest.com%2Fideas%2Fthe-diary-of-anne-frank-aesthetic%2F910201561077%2F&docid=yLG62Ko1-AQhWM&w=200&h=150&hl=en-US&source=sh%2Fx%2Fim%2Fm5%2F4&kgs=d5403a0d102e8d84&shem=epsd1%2Crimspwouoe" alt="">
            </div>

            <div class="curve">

                <h2 class="welcome">
                    Welcome Back ✨
                </h2>

                <p class="subtitle">
                    Glad to see you again
                </p>

                <h1>Login</h1>

                <input
                type="text"
                placeholder="Username or Email">

                <input
                type="password"
                placeholder="Password">

                <button>
                    Login
                </button>

                <p class="switch-text">
                    New here?
                    <span id="showSignup">
                        Sign Up
                    </span>
                </p>

            </div>

        </section>

        <!-- SIGNUP PAGE -->

        <section class="screen signup-screen">

            <div class="top-image">
                <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1000" alt="">
            </div>

            <div class="curve">

                <h2 class="welcome">
                    Welcome 🌸
                </h2>

                <p class="subtitle">
                    Create your account
                </p>

                <h1>Sign Up</h1>

                <input
                type="text"
                placeholder="Username">

                <input
                type="email"
                placeholder="Email">

                <input
                type="password"
                placeholder="Password">

                <button>
                    Sign Up
                </button>

                <p class="switch-text">
                    Back again?
                    <span id="showLogin">
                        Login
                    </span>
                </p>

            </div>

        </section>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
